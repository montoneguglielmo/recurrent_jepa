defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: outputs/2026-05-19/11-58-14/checkpoints/best # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

get_action_config:
  replanning_steps: 5
  n_samples: 300
  n_elite: 30
  n_cem_iters: 20
  planning_horizon: 5
  init_std: 1.0
  num_inference_steps: 20
  eval_budget: ${eval.eval_budget}

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state
          
output:
  filename: pusht_results.txt