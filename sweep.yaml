program: eval.py
entity: montone-guglielmo-wb
project: lewm-eval
method: bayes
command:
  - ${env}
  - python
  - ${program}
metric:
  name: success_rate
  goal: maximize
parameters:
  get_action_config:
    parameters:
      n_samples:
        distribution: int_uniform
        min: 50
        max: 500
      n_elite:
        distribution: int_uniform
        min: 5
        max: 50
      n_cem_iters:
        distribution: int_uniform
        min: 5
        max: 30
      planning_horizon:
        values: [3, 5, 7]
      init_std:
        distribution: uniform
        min: 0.5
        max: 2.0
      num_inference_steps:
        values: [10, 20, 30, 50]
      replanning_steps:
        values: [3, 5]
