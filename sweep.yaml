program: eval.py
method: bayes
metric:
  name: success_rate
  goal: maximize
parameters:
  get_action_config:
    parameters:
      n_samples:
        distribution: int_uniform
        min: 50
        max: 500
      n_elite:
        distribution: int_uniform
        min: 5
        max: 50
      n_cem_iters:
        distribution: int_uniform
        min: 5
        max: 30
      planning_horizon:
        values: [3, 5, 7, 10]
      init_std:
        distribution: uniform
        min: 0.5
        max: 2.0
      num_inference_steps:
        values: [10, 20, 30]
      replanning_steps:
        values: [1, 3, 5, 10]
